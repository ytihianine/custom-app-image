name: Build and Push custom apache polaris image

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository_owner }}/apache-polaris-custom

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -f apache_polaris.Dockerfile
          -t $IMAGE_NAME:${GITHUB_SHA::7} .

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: docker push $IMAGE_NAME:${GITHUB_SHA::7}
